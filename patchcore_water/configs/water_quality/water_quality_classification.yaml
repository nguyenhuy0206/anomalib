class_path: anomalib.data.Folder
init_args:
  name: "water_quality"
  root: "data/water_quality"

  normal_dir: "train/normal"
  abnormal_dir: "test/abnormal"
  normal_test_dir: "test/normal"

  normal_split_ratio: 0.0

  train_batch_size: 8
  eval_batch_size: 8
  num_workers: 4

  # KHÔNG có 'task' ở đây
  # KHÔNG có 'image_size' ở đây
  # KHÔNG có 'extensions' ở đây

  test_split_mode: "from_dir"
  val_split_mode: "same_as_test"
  val_split_ratio: 0.5

  seed: 42
